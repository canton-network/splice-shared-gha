name: Cleanup Nix Cache

on:
  workflow_call:
    inputs:
      runs_on:
        description: "Runner label to use (must be a self-hosted runner with /cache/nix)"
        type: string
        required: true
      max_age_days:
        description: "Delete cache entries older than this many days"
        type: string
        required: false
        default: "30"

jobs:
  cleanup:
    runs-on: ${{ inputs.runs_on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive
      - uses: ./splice-shared-gha/.github/actions/nix/cleanup_nix_cache
        with:
          max_age_days: ${{ inputs.max_age_days }}
