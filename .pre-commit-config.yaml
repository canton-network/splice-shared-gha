exclude: '^actions/.*.js'
repos:
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: ["--severity=warning"] # Optionally only show errors and warnings
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.10
    hooks:
      - id: actionlint
        args: ["-pyflakes=", "-shellcheck=shellcheck"] # Enable shellcheck integration and disable pyflakes integration
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0 # Use the ref you want to point at
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: .github/actions/tests/split_tests/dist/index.js # Exclude build output file
      - id: check-merge-conflict
      - id: check-yaml
      - id: mixed-line-ending
  - repo: local
    hooks:
      - id: pin-github-actions
        name: Pin GitHub Actions versions
        description: Pin GHA action versions
        language: system
        entry: npx
        args: ['pin-github-action']
        files: '^.github/workflows/'
        types: [yaml]
      - id: build
        name: Make sure actions are built.
        language: system
        entry: ./scripts/check-build.sh
        pass_filenames: false
        files: '(^package\.json$|^package-lock\.json$|^src/.*\.ts$)'
      - id: build-split-tests
        name: Build split_tests action
        language: system
        entry: bash -c 'cd .github/actions/tests/split_tests && npm ci && npm run build'
        pass_filenames: false
        files: '(^\.github/actions/tests/split_tests/package\.json$|^\.github/actions/tests/split_tests/package-lock\.json$|^\.github/actions/tests/split_tests/src/.*\.ts$)'
